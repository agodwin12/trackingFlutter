name: FLEETRA
description: "FLEETRA - GPS Vehicle Tracking System"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 4.0.1+6


environment:
  sdk: ^3.6.2


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  connectivity_plus: ^6.0.5
  lottie: ^3.1.0
  http: ^1.3.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.7.1
  flutter_launcher_icons: ^0.14.3
  geolocator: ^10.1.0
  socket_io_client: ^2.0.3+1
  flutter_local_notifications: ^17.1.2
  carousel_slider: ^5.0.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.7
  url_launcher: ^6.2.2
  provider: ^6.1.1
  local_auth: ^2.1.7
  local_auth_android: ^1.0.34
  crypto: ^3.0.3
  shimmer: ^3.0.0
  sticky_headers: ^0.3.0
  webview_flutter: ^4.7.0




flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true


  assets:
   - assets/login.png
   - assets/login1.png
   - assets/onboarding1.png
   - assets/onboarding2.jpg
   - assets/onboarding3.jpg
   - assets/onboarding4.jpg
   - assets/carmarker.png
   - assets/logo.jpg
   - assets/stolen.png
   - assets/open.ico
   - assets/lock.ico
   - assets/open.png
   - assets/lock.png
   - assets/logo.png
   - assets/mtn_logo.png
   - assets/orange_logo.png
   - assets/splash.png
   - .env


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

